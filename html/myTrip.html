<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css?v=responsive-4step-20260716">
    <title>나의 추천 여행지</title>

</head>
<body>

    <!-- 상단 타이틀 배너 -->
    <header>
        <h1>✈️ 내가 사랑하는 추천 여행지</h1>
        <p>아름다운 자연과 평화로운 감성을 만끽할 수 있는 최고의 아카이브</p>
    </header>

    <main>
        <!-- 1. 배경 음악 / 오디오 섹션 -->
        <section>
            <h2>🎵 여행지의 감성을 담은 사운드</h2>
            <p class="section-desc trip-card">아래 재생 버튼을 누르면 여행을 준비하는 듯한 잔잔한 배경 사운드를 들으며 감상하실 수 있습니다.</p>
            <div class="media-wrapper">
                <audio controls>
                    <source src="media/trip-ambient.wav" type="audio/wav">
                    브라우저가 오디오 태그를 지원하지 않습니다.
                </audio>
            </div>
        </section>

        <!-- 2. 여행지 소개 및 이미지 섹션 -->
        <section>
            <h2>📸 여행지 스케치: 호수 위로 비치는 설산</h2>
            <p class="section-desc trip-card">잔잔한 호수와 눈 덮인 산이 함께 보이는 풍경은 복잡한 머릿속을 차분하게 비워줍니다.</p>
            <div class="media-wrapper">
                <img src="media/trip-mountain.png" alt="호수 위로 반사되는 눈 덮인 산과 푸른 하늘 풍경">
            </div>
        </section>

        <!-- 3. 여행지 동영상 섹션 -->
        <section>
            <h2>🎥 생생한 여행지 현장 영상</h2>
            <p class="section-desc trip-card">카메라에 생생하게 담아온 여행지의 상쾌한 바람과 대자연을 눈과 귀로 직접 느껴보세요.</p>
            <div class="media-wrapper">
                <video controls poster="media/trip-mountain.png" preload="metadata">
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                    브라우저가 비디오 태그를 지원하지 않습니다.
                </video>
            </div>
        </section>
    </main>

    <!-- 메인 페이지로 복귀 링크 -->
    <a href="index.html" class="back-btn">🏠 메인 페이지로 돌아가기</a>

</body>
</html>
