<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네트워킹 등록</title>

    <!-- 일관성 있는 디자인을 위한 Pretendard 폰트 링크 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

    <style>
        /* 1. 웹페이지 기본 배경 및 서체 */
        body {
            background-color: #f4f6f9;
            color: #2c3e50;
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            line-height: 1.6;
            margin: 0 auto;
            max-width: 600px;
            padding: 40px 20px;
        }

        /* 2. 상단 타이틀 영역 */
        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 2rem;
            color: #0f172a;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        header p {
            color: #64748b;
            font-size: 0.95rem;
            margin: 0;
        }

        /* 3. Form 양식 및 필드셋 스타일링 */
        form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        fieldset {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 30px;
            margin: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        legend {
            background-color: #1e293b;
            color: #ffffff;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        /* 4. 입력 폼 요소들 기본 레이아웃 */
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #334155;
        }

        /* 인풋, 셀렉트, 텍스트에어리어 통합 스타일 */
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 0.95rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background-color: #f8fafc;
            color: #1e293b;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        /* 5. 디테일 기능 레이아웃 스타일링 */

        /* [비밀번호 표시 토글] */
        .pw-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .pw-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            cursor: pointer;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            user-select: none;
        }
        .pw-toggle:hover {
            color: #1e293b;
            background-color: #f1f5f9;
        }

        /* [이메일 도메인 간편 선택] */
        .email-container {
            display: grid;
            grid-template-columns: 1fr auto 1.2fr;
            align-items: center;
            gap: 8px;
        }

        .email-at {
            color: #64748b;
            font-weight: 600;
        }

        /* 자기소개 / 제안 메시지 창 */
        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* 개인정보 동의 체크박스 */
        .agreement-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 15px;
            background-color: #f1f5f9;
            border-radius: 8px;
            margin-top: 5px;
        }

        .agreement-group input[type="checkbox"] {
            margin-top: 4px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .agreement-group label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #475569;
            cursor: pointer;
            line-height: 1.4;
        }

        /* 6. 버튼 레이아웃 */
        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        input[type="submit"],
        input[type="reset"] {
            padding: 14px;
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        input[type="submit"] {
            background-color: #3b82f6;
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.15);
        }

        input[type="submit"]:hover {
            background-color: #2563eb;
        }

        input[type="reset"] {
            background-color: #e2e8f0;
            color: #475569;
        }

        input[type="reset"]:hover {
            background-color: #cbd5e1;
            color: #1e293b;
        }

        /* 하단 돌아가기 버튼 */
        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #1e293b;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>📝 멤버 등록 및 연락처 남기기</h1>
        <p>저와 소통하거나 협업 제안을 위한 정보를 입력해 주세요.</p>
    </header>

    <form action="signUpResult.html" method="get" onsubmit="combineEmail()">
        
        <!-- 1. 계정 정보 설정 -->
        <fieldset>
            <legend>계정 정보 설정</legend>
            
            <div class="form-group">
                <label for="userId">사용할 아이디 (ID)</label>
                <input type="text" id="userId" name="userId" placeholder="아이디를 입력하세요" required>
            </div>
            
            <div class="form-group">
                <label for="userPw">비밀번호 (PW)</label>
                <div class="pw-container">
                    <input type="password" id="userPw" name="userPw" placeholder="비밀번호를 입력하세요" required>
                    <button type="button" class="pw-toggle" onclick="togglePassword()">보기</button>
                </div>
            </div>
        </fieldset>

        <!-- 2. 인적 사항 및 연락처 -->
        <fieldset>
            <legend>연락처 및 소속 정보</legend>
            
            <div class="form-group">
                <label for="userName">이름 / 기업명</label>
                <input type="text" id="userName" name="userName" placeholder="이름 또는 회사명을 입력하세요" required>
            </div>
            
            <!-- 이메일 분할 입력 및 도메인 선택 기능 -->
            <div class="form-group">
                <label>이메일 주소</label>
                <div class="email-container">
                    <input type="text" id="emailId" placeholder="이메일" required>
                    <span class="email-at">@</span>
                    <select id="emailDomain" onchange="handleDomainChange()">
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                        <option value="custom">직접 입력</option>
                    </select>
                </div>
                <input type="text" id="customDomain" placeholder="도메인을 직접 입력하세요 (예: outlook.com)" style="display: none; margin-top: 8px;">
                <input type="hidden" id="userEmail" name="userEmail">
            </div>

            <div class="form-group">
                <label for="userPhone">연락처</label>
                <input type="tel" id="userPhone" name="userPhone" placeholder="010-0000-0000" required>
            </div>
        </fieldset>

        <!-- 3. 소통 목적 및 인사말 -->
        <fieldset>
            <legend>네트워킹 정보</legend>
            
            <div class="form-group">
                <label for="birthRoute">방문/가입 목적</label>
                <select id="birthRoute" name="birthRoute">
                    <option value="recommend">단순 포트폴리오 구경</option>
                    <option value="sns">프로젝트 협업 제안</option>
                    <option value="search">채용 및 면접 제안</option>
                    <option value="etc">기타 친목 및 네트워킹</option>
                </select>
            </div>

            <div class="form-group">
                <label for="intro">남기고 싶은 메시지</label>
                <textarea id="intro" name="intro" placeholder="협업 상세 제안이나 응원의 한마디를 자유롭게 남겨주세요!"></textarea>
            </div>

            <div class="agreement-group">
                <input type="checkbox" id="agree" required>
                <label for="agree">[필수] 작성한 연락처 및 정보의 활용 동의</label>
            </div>
        </fieldset>

        <!-- 4. 전송 및 초기화 버튼 구역 -->
        <div class="btn-group">
            <input type="submit" value="등록 및 전송하기">
            <input type="reset" value="다시 쓰기" onclick="resetForm()">
        </div>

    </form>

    <div class="back-link">
        <a href="index.html">🏠 메인 페이지로 돌아가기</a>
    </div>

    <script>
        // 비밀번호 보기/숨기기 토글
        function togglePassword() {
            const pwInput = document.getElementById('userPw');
            const pwBtn = document.querySelector('.pw-toggle');
            if (pwInput.type === 'password') {
                pwInput.type = 'text';
                pwBtn.textContent = '숨기기';
            } else {
                pwInput.type = 'password';
                pwBtn.textContent = '보기';
            }
        }

        // 이메일 도메인 직접입력 전환
        function handleDomainChange() {
            const domainSelect = document.getElementById('emailDomain');
            const customInput = document.getElementById('customDomain');
            if (domainSelect.value === 'custom') {
                customInput.style.display = 'block';
                customInput.required = true;
            } else {
                customInput.style.display = 'none';
                customInput.required = false;
                customInput.value = '';
            }
        }

        // 폼 제출 시 이메일 결합
        function combineEmail() {
            const emailId = document.getElementById('emailId').value;
            const domainSelect = document.getElementById('emailDomain').value;
            let finalDomain = domainSelect;

            if (domainSelect === 'custom') {
                finalDomain = document.getElementById('customDomain').value;
            }

            document.getElementById('userEmail').value = `${emailId}@${finalDomain}`;
        }

        // 폼 초기화 시 세부사항 초기화
        function resetForm() {
            document.getElementById('customDomain').style.display = 'none';
        }
    </script>
</body>
</html>
