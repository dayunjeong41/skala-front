<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
    <title id="title">Dark satellite map background</title>
    <desc id="desc">Dark GIS style map with roads, river, city lights, and route lines.</desc>
