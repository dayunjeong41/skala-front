<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css?v=pin-map-20260716">
    <script src="../script/form.js" defer></script>
    <title>등록 완료</title>
    
</head>
<body>

    <div class="container">
        <!-- 뱃지 형태의 세련된 체크&스타 그래픽과 주변 장식 -->
        <div class="icon-wrapper">
            <div class="sparkle sparkle-1"></div>
            <div class="sparkle sparkle-2"></div>
            <div class="sparkle sparkle-3"></div>
            <!-- 트로피 모양의 SVG 그래픽으로 더 고오급 축하 느낌 전달 -->
            <svg viewBox="0 0 24 24">
                <path d="M18 2H6v2H1v6c0 3.61 2.31 6.67 5.5 7.72V19c0 .55.45 1 1 1h2v2h6v-2h2c.55 0 1-.45 1-1v-1.28c3.19-1.05 5.5-4.11 5.5-7.72V4h-5V2zm-1 8c0 2.76-2.24 5-5 5s-5-2.24-5-5V4h10v6zm4-2h-2V6h2v2zM3 8V6h2v2H3z"/>
            </svg>
        </div>
        
        <h1>반갑습니다!</h1>
        <p class="welcome-msg">
            멤버 등록이 성공적으로 완료되었습니다.<br>
            저의 소중한 파트너가 되어주셔서 감사합니다.
        </p>

        <div class="result-card">
            <h2>제출한 정보</h2>
            <dl class="result-list">
                <div>
                    <dt>아이디</dt>
                    <dd id="resultUserId">-</dd>
                </div>
                <div>
                    <dt>이름 / 기업명</dt>
                    <dd id="resultUserName">-</dd>
                </div>
                <div>
                    <dt>이메일</dt>
                    <dd id="resultUserEmail">-</dd>
                </div>
                <div>
                    <dt>연락처</dt>
                    <dd id="resultUserPhone">-</dd>
                </div>
                <div>
                    <dt>가입 목적</dt>
                    <dd id="resultBirthRoute">-</dd>
                </div>
                <div>
                    <dt>선호 연락 방식</dt>
                    <dd id="resultContactMethod">-</dd>
                </div>
                <div>
                    <dt>메시지</dt>
                    <dd id="resultIntro">-</dd>
                </div>
            </dl>
        </div>

        <!-- 다크 테마용 안내 카드 -->
        <div class="info-box">
            <h2>
                <span>✉️</span> 소중히 간직하겠습니다
            </h2>
            <ul>
                <li>남겨주신 소중한 메시지와 연락처를 확인하고 있습니다.</li>
                <li>빠른 시일 내에 기재해주신 이메일로 회신드리겠습니다.</li>
            </ul>
        </div>
        
        <!-- 이동 버튼 -->
        <a href="index.html" class="btn-home">
            🏠 메인 페이지로 돌아가기
        </a>
    </div>

</body>
</html>
