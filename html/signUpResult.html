<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>등록 완료</title>
    <!-- 세련된 Pretendard 폰트 불러오기 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <style>
        /* 1. 확 눈에 띄는 트렌디한 그라데이션 배경 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%); /* 깊이감 있고 몽환적인 다크 그라데이션 */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; /* 배경 장식 요소가 넘치지 않도록 설정 */
            position: relative;
        }

        /* 은은하게 퍼지는 배경 빛 (눈길을 사로잡는 포인트) */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            top: 10%;
            left: 15%;
            z-index: 1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(219, 39, 119, 0.1) 0%, transparent 70%);
            bottom: 10%;
            right: 10%;
            z-index: 1;
        }

        /* 2. 중앙 정렬 카드 레이아웃 (유리창 같은 Glassmorphism 효과) */
        .container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px); /* 뒤 배경을 흐리게 처리하는 고급 효과 */
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 45px 35px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-sizing: border-box;
            z-index: 10;
        }

        /* 3. 단순 이모티콘을 넘어선 역동적인 축하 그래픽 효과 (CSS 구현) */
        .icon-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 24px auto;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
            animation: pulse 2s infinite;
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            fill: #ffffff;
            animation: bounce 1.2s ease infinite alternate;
        }

        /* 주변에 흩날리는 미니 스파클 장식 */
        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #facc15;
            border-radius: 50%;
            animation: float 2s infinite ease-in-out;
        }
        .sparkle-1 { top: -10px; left: 10px; animation-delay: 0.2s; }
        .sparkle-2 { bottom: 0px; right: -15px; width: 12px; height: 12px; background-color: #38bdf8; animation-delay: 0.5s; }
        .sparkle-3 { top: 30px; left: -20px; background-color: #f43f5e; animation-delay: 0.8s; }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-msg {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        /* 4. 안내 사항 카드 (차분하고 어두운 다크 테마에 조화롭게) */
        .info-box {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 22px;
            text-align: left;
            margin-bottom: 35px;
        }

        .info-box h2 {
            font-size: 0.95rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            color: #a855f7; /* 보라빛 포인트 컬러 */
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-box ul {
            margin: 0;
            padding-left: 18px;
            color: #94a3b8;
            font-size: 0.85rem;
            line-height: 1.7;
        }

        .info-box li {
            margin-bottom: 6px;
        }

        .info-box li:last-child {
            margin-bottom: 0;
        }

        /* 5. 메인으로 돌아가기 버튼 (반짝이는 그러데이션 버튼) */
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
        }

        .btn-home:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .btn-home:active {
            transform: translateY(0);
        }

        /* 애니메이션 소스 정의 */
        @keyframes bounce {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-6px) rotate(5deg); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-10px) scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 뱃지 형태의 세련된 체크&스타 그래픽과 주변 장식 -->
        <div class="icon-wrapper">
            <div class="sparkle sparkle-1"></div>
            <div class="sparkle sparkle-2"></div>
            <div class="sparkle sparkle-3"></div>
            <!-- 트로피 모양의 SVG 그래픽으로 더 고오급 축하 느낌 전달 -->
            <svg viewBox="0 0 24 24">
                <path d="M18 2H6v2H1v6c0 3.61 2.31 6.67 5.5 7.72V19c0 .55.45 1 1 1h2v2h6v-2h2c.55 0 1-.45 1-1v-1.28c3.19-1.05 5.5-4.11 5.5-7.72V4h-5V2zm-1 8c0 2.76-2.24 5-5 5s-5-2.24-5-5V4h10v6zm4-2h-2V6h2v2zM3 8V6h2v2H3z"/>
            </svg>
        </div>
        
        <h1>반갑습니다!</h1>
        <p class="welcome-msg">
            멤버 등록이 성공적으로 완료되었습니다.<br>
            저의 소중한 파트너가 되어주셔서 감사합니다.
        </p>

        <!-- 다크 테마용 안내 카드 -->
        <div class="info-box">
            <h2>
                <span>✉️</span> 소중히 간직하겠습니다
            </h2>
            <ul>
                <li>남겨주신 소중한 메시지와 연락처를 확인하고 있습니다.</li>
                <li>빠른 시일 내에 기재해주신 이메일로 회신드리겠습니다.</li>
            </ul>
        </div>
        
        <!-- 이동 버튼 -->
        <a href="index.html" class="btn-home">
            🏠 메인 페이지로 돌아가기
        </a>
    </div>

</body>
</html>
